<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Anniversary</title>
<style>
body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: linear-gradient(135deg,#ffecd2,#fcb69f);
  text-align: center;
  overflow: hidden;
}
.container {
  padding: 20px;
  max-width: 600px;
}
h1 {
  font-size: 3rem;
  color: #fff;
}
p {
  font-size: 1.2rem;
  color: #fff;
  min-height: 2em;
}
button {
  margin-top: 20px;
  padding: 12px 20px;
  border: none;
  border-radius: 25px;
  background: white;
  font-size: 16px;
  cursor: pointer;
}
canvas {
  position: fixed;
  top: 0;
  left: 0;
  pointer-events: none;
}
.gallery {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 20px;
  gap: 10px;
}
.gallery img {
  width: 100px;
  height: 100px;
  object-fit: cover;
  border-radius: 10px;
  cursor: pointer;
  transition: transform 0.3s;
}
.gallery img:hover { transform: scale(1.1); }
#giftBox {
  width: 150px;
  height: 150px;
  background: #ff6f61;
  border-radius: 15px;
  margin: 20px auto;
  position: relative;
  cursor: pointer;
  overflow: hidden;
}
#giftLid {
  width: 150px;
  height: 50px;
  background: #ff3b2f;
  position: absolute;
  top: 0;
  border-radius: 15px 15px 0 0;
  transition: top 0.5s;
}
@media(max-width: 600px) {
  h1 { font-size: 2.2rem; }
  p { font-size: 1rem; }
}
</style>
</head>
<body>
<canvas id="confetti"></canvas>
<audio id="music" src="crystaleyeofficial-wedding-party-happy-anniversary-celebration-background-music-364010.mp3" autoplay loop></audio>
<div class="container">
  <input type="text" id="nameInput" placeholder="Enter Name" style="padding:10px; border-radius:5px; margin-bottom:10px;">
  <button onclick="updateName()">Set Name</button>
  <h1 id="greeting">💖 Happy Anniversary! 💕</h1>
  <p id="typingMessage"></p>
  <button onclick="startConfetti()">Celebrate 🎊</button>

  <div id="giftBox" onclick="openGift()">
    <div id="giftLid"></div>
  </div>

  <div class="gallery">
    <img src="m1.jfif" alt="Memory 1">
    <img src="m2.jfif" alt="Memory 2">
    <img src="m3.jfif" alt="Memory 3">
    <img src="m4.jfif" alt="Memory 4">
  </div>
</div>
<script>
// Confetti setup
const canvas = document.getElementById("confetti");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
let pieces = [];
function random(min, max) { return Math.random()*(max-min)+min; }
function createPieces() {
  pieces = [];
  for(let i=0;i<150;i++) {
    pieces.push({ x: random(0,canvas.width), y: random(-canvas.height,0), size: random(5,10), speed: random(2,5), angle: random(0,360) });
  }
}
function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  pieces.forEach(p => {
    ctx.beginPath();
    ctx.rect(p.x,p.y,p.size,p.size);
    ctx.fillStyle = `hsl(${p.angle},80%,60%)`;
    ctx.fill();
    p.y += p.speed;
    if(p.y > canvas.height){ p.y = 0; }
  });
  requestAnimationFrame(draw);
}
function startConfetti(){ createPieces(); draw(); }
window.addEventListener("resize", ()=>{ canvas.width = window.innerWidth; canvas.height = window.innerHeight; });

// Name customization
function updateName(){
  const name = document.getElementById('nameInput').value;
  if(name) document.getElementById('greeting').textContent = `💖 Happy Anniversary ${name}! 💕`;
}

// Typing message animation
const message = "Wishing you both endless love, laughter, and happiness together.";
let i = 0;
function typeMessage(){
  if(i < message.length){
    document.getElementById('typingMessage').textContent += message.charAt(i);
    i++;
    setTimeout(typeMessage, 50);
  }
}
window.onload = typeMessage;

// Gift box animation
function openGift(){
  const lid = document.getElementById('giftLid');
  lid.style.top = '-60px';
  startConfetti();
}
</script>
</body>
</html>
